apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chaincommand.fullname" . }}-secret
  labels:
    {{- include "chaincommand.labels" . | nindent 4 }}
type: Opaque
data:
  CC_API_KEY: {{ .Values.secrets.apiKey | b64enc | quote }}
  CC_OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  # POSTGRES_PASSWORD: Set via .Values.postgresql.auth.existingSecret or override in values.yaml
  POSTGRES_PASSWORD: {{ required "postgresql.auth.existingSecret must be set" .Values.postgresql.auth.existingSecret | b64enc | quote }}
